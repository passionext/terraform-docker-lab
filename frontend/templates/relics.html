<!DOCTYPE html>
<html>
<head>
    <title>Time Trial Relics</title>
    <style>
        body { background-color: #4a752c; font-family: 'Comic Sans MS', cursive, sans-serif; text-align: center; color: white; margin-top: 50px;}
        h1 { color: #ffcc00; text-shadow: 2px 2px #4b2e10; font-size: 3em; margin-bottom: 30px; }
        table { width: 70%; margin: 0 auto 30px auto; border-collapse: collapse; background-color: #8b5a2b; border: 8px solid #5c3a21; box-shadow: 10px 10px 20px rgba(0,0,0,0.5); font-size: 1.2em;}
        th, td { padding: 15px; border: 3px solid #5c3a21; }
        th { background-color: #ffcc00; color: #4b2e10; }
        .sapphire { color: #87ceeb; font-weight: bold; text-shadow: 1px 1px #000;}
        .gold { color: #ffd700; font-weight: bold; text-shadow: 1px 1px #000;}
        .platinum { color: #e5e4e2; font-weight: bold; text-shadow: 1px 1px #000;}
        a.btn { background-color: #ffcc00; padding: 10px 20px; text-decoration: none; color: #4b2e10; font-weight: bold; border-radius: 5px; border: 3px solid #cc6600; box-shadow: 3px 3px 0px #cc6600;}
        a.btn:hover { background-color: #ff9900; }
    </style>
</head>
<body>
    <h1>Time Trial Records</h1>
    <table>
        <thead>
            <tr>
                <th>Level</th>
                <th>Sapphire</th>
                <th>Gold</th>
                <th>Platinum</th>
            </tr>
        </thead>
        <tbody>
            {% for relic in relics %}
            <tr>
                <td>{{ relic.level }}</td>
                <td class="sapphire">{{ relic.sapphire }}</td>
                <td class="gold">{{ relic.gold }}</td>
                <td class="platinum">{{ relic.platinum }}</td>
            </tr>
            {% else %}
            <tr><td colspan="4">Uh oh! Neo Cortex jammed the signal. Could not load data.</td></tr>
            {% endfor %}
        </tbody>
    </table>
    
    <a href="/" class="btn"><- Back to Warp Room</a>
</body>
</html>
