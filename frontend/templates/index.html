<!DOCTYPE html>
<html>
<head>
    <title>Crash Bandicoot Hub</title>
    <style>
        body { background-color: #f7a52c; font-family: 'Comic Sans MS', cursive, sans-serif; text-align: center; color: #4b2e10; }
        .wood-board { background-color: #8b5a2b; border: 8px solid #5c3a21; border-radius: 15px; padding: 40px; margin: 10vh auto; width: 50%; color: white; box-shadow: 10px 10px 20px rgba(0,0,0,0.5); }
        h1 { color: #ffcc00; text-shadow: 2px 2px #cc6600; font-size: 3em; margin-top: 0;}
        a.btn { display: inline-block; background-color: #ffcc00; border: 4px solid #cc6600; padding: 15px 30px; font-size: 24px; font-weight: bold; color: #4b2e10; text-decoration: none; border-radius: 10px; margin-top: 20px; cursor: pointer; transition: 0.2s; box-shadow: 3px 3px 0px #cc6600;}
        a.btn:hover { background-color: #ff9900; transform: translateY(2px); box-shadow: 1px 1px 0px #cc6600; }
    </style>
</head>
<body>
    <div class="wood-board">
        <h1>WOAH!</h1>
        <h2>Welcome to N. Sanity Island</h2>
        <p>Ready to smash some crates and check your Time Trial records?</p>
        <a href="/relics" class="btn">View Relic Times -></a>
    </div>
</body>
</html>
