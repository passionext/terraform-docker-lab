events {}
http {
    upstream web_backend {
        server frontend_server_0:80;
        server frontend_server_1:80;
    }
    
    server {
        listen 80;
        
        location / {
            proxy_pass http://web_backend;
        }

        location /grafana/ {
            proxy_pass http://grafana_server:3000/;
            proxy_set_header Host $http_host;
        }

        location /prometheus/ {
            proxy_pass http://prometheus_server:9090/;
        }
    }
}
